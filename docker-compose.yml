version: "3.8"

services:
  backend:
    build:
      context: ./smart-leads-backend
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      # IMPORTANT: Set these in a .env file at the root directory, or replace them here directly
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_change_me}
      - JWT_EXPIRES_IN=1d
    restart: unless-stopped
    networks:
      - smart-leads-network

  frontend:
    build:
      context: ./smart-leads-dashboard
      dockerfile: Dockerfile
      args:
        # Assuming the backend is mapped to localhost:5000 on the host machine.
        # For production deployments, this should be the public URL of your backend.
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000/api/v1}
    container_name: smart-leads-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - smart-leads-network

networks:
  smart-leads-network:
    driver: bridge
